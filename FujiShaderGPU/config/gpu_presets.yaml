# GPU preset definitions.
# Only ``vram_gb`` / ``vram_gb_range`` are read (by gpu_config_manager for GPU-type
# naming); the per-entry chunk_size/rmm values are kept as human reference anchors.
# The authoritative performance parameters are computed in config/auto_tune.py.
gpu_presets:
  # Entry level
  rtx4070_laptop:
    vram_gb: 12
    vram_gb_range: [10, 14]  # range added for detection
    chunk_size: 768
    rmm_pool_size_gb: 8
    rmm_pool_fraction: 0.55
  
  t4:
    vram_gb: 16
    vram_gb_range: [14, 20]
    chunk_size: 1024
    rmm_pool_size_gb: 12
    rmm_pool_fraction: 0.6
   
  # Mid range
  l4:
    vram_gb: 24
    vram_gb_range: [20, 35]
    chunk_size: 2048
    rmm_pool_size_gb: 16
    rmm_pool_fraction: 0.65
   
  # High end
  a100_40gb:
    vram_gb: 40
    vram_gb_range: [35, 70]
    chunk_size: 8192
    rmm_pool_size_gb: 28
    rmm_pool_fraction: 0.7
  
  a100_80gb:
    vram_gb: 80
    vram_gb_range: [70, 85]
    chunk_size: 12288
    rmm_pool_size_gb: 56
    rmm_pool_fraction: 0.7
  
  # Top tier
  h100:
    vram_gb: 80
    vram_gb_range: [85, 100]
    chunk_size: 16384
    rmm_pool_size_gb: 60
    rmm_pool_fraction: 0.75
